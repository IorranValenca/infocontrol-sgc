{% extends "web/base.html" %}
{% load static %}                {# Habilita {% static %} para carregar a logo #}
{% block nav %}{% endblock %}   {# A tela de login nao exibe a barra de navegacao #}

{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <img class="brand-logo" src="{% static 'web/logo.png' %}" alt="InfoControl">
    <div class="sub">Sistema de Gestao Comercial</div>

    <form id="form" novalidate>
      <label>Usuario</label>
      <input id="username" required autofocus>
      <label>Senha</label>
      <input id="senha" type="password" required>
      <div id="login-erro" role="alert" aria-live="polite" style="display:none; margin-top:12px; color:var(--danger); font-size:13px; font-weight:600;"></div>
      <button type="submit">Entrar</button>
    </form>

    <div class="alt"><a href="/recuperar/">Esqueci minha senha</a></div>
  </div>
</div>
{% endblock %}

{% block script %}
<script>
  // Ja autenticado? Vai direto para o sistema.
  if (getToken()) getMe().then((u) => location.href = homeFor(u.perfil)).catch(() => location.href = "/");

  function mostrarErroLogin(msg) {
    const erro = document.getElementById("login-erro");
    erro.textContent = msg;
    erro.style.display = "block";
  }

  function limparErroLogin() {
    const erro = document.getElementById("login-erro");
    erro.style.display = "none";
    erro.textContent = "";
  }

  // Envia usuario e senha para /api/auth/login/ e guarda o token retornado.
  document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();
    limparErroLogin();

    const usuario = username.value.trim();
    const password = senha.value;
    if (!usuario && !password) return mostrarErroLogin("Informe o usuario e a senha.");
    if (!usuario) return mostrarErroLogin("Informe o usuario.");
    if (!password) return mostrarErroLogin("Informe a senha.");

    try {
      const data = await api("/auth/login/", {
        method: "POST",
        body: JSON.stringify({
          username: usuario,
          password: password,
        }),
      });
      setToken(data.access);          // Guarda o token JWT no navegador
      location.href = homeFor(data.perfil);  // Entra na tela inicial do perfil
    } catch (err) {
      mostrarErroLogin("Usuario nao encontrado ou senha invalida.");
      toast("Usuario nao encontrado ou senha invalida.", false);
    }
  };
</script>
{% endblock %}
